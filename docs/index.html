<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRMC Signal Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0c0f;
    --surface:   #111318;
    --border:    #1e2229;
    --border2:   #2a3040;
    --text:      #c8d0dd;
    --muted:     #4a5568;
    --buy:       #00e5a0;
    --sell:      #ff4d6a;
    --accent:    #3b82f6;
    --warn:      #f59e0b;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #fff;
  }
  .logo span { color: var(--buy); }
  #last-update {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  /* ── Stats bar ── */
  .stats {
    display: flex;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    flex: 1;
    padding: 14px 24px;
    background: var(--surface);
  }
  .stat-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: #fff;
  }
  .stat-value.buy  { color: var(--buy); }
  .stat-value.sell { color: var(--sell); }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .filter-group {
    display: flex;
    gap: 2px;
    background: var(--border);
    padding: 2px;
    border-radius: 6px;
  }
  .filter-btn {
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 14px;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .filter-btn:hover  { color: var(--text); }
  .filter-btn.active {
    background: var(--border2);
    color: #fff;
    font-weight: 500;
  }
  .filter-btn.active.buy-active  { color: var(--buy); }
  .filter-btn.active.sell-active { color: var(--sell); }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 180px;
    max-width: 300px;
  }
  .search-wrap svg {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }
  #search {
    width: 100%;
    padding: 7px 10px 7px 34px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  /* ── Table ── */
  .table-wrap {
    overflow-x: auto;
    padding: 0 32px 32px;
    margin-top: 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12px;
  }
  thead th {
    text-align: left;
    padding: 8px 12px;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border2);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--text); }
  thead th.sort-asc::after  { content: " ↑"; color: var(--accent); }
  thead th.sort-desc::after { content: " ↓"; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--surface); }

  td {
    padding: 10px 12px;
    vertical-align: middle;
    white-space: nowrap;
  }

  .ticker-cell {
    font-weight: 600;
    font-size: 13px;
    color: #fff;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .badge-buy  { background: rgba(0,229,160,0.12); color: var(--buy); border: 1px solid rgba(0,229,160,0.3); }
  .badge-sell { background: rgba(255,77,106,0.12); color: var(--sell); border: 1px solid rgba(255,77,106,0.3); }
  .badge-tf   { background: rgba(59,130,246,0.1); color: var(--accent); border: 1px solid rgba(59,130,246,0.2); }
  .badge-market { background: rgba(245,158,11,0.1); color: var(--warn); border: 1px solid rgba(245,158,11,0.2); }

  .price-cell { color: #fff; }
  .macd-pos   { color: var(--buy); }
  .macd-neg   { color: var(--sell); }
  .date-cell  { color: var(--muted); }

  .empty-state {
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
  }
  .empty-state .big { font-size: 32px; margin-bottom: 12px; }

  #loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px;
    gap: 12px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Chinese characters rendered correctly ── */
  .cn-signal {
    font-family: 'Noto Sans SC', var(--sans);
    font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">MRMC <span>抄底</span> Scanner</div>
  <div id="last-update">Loading…</div>
</header>

<div class="stats">
  <div class="stat">
    <div class="stat-label">Scanned</div>
    <div class="stat-value" id="stat-scanned">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">抄底 Buy signals</div>
    <div class="stat-value buy" id="stat-buy">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">卖出 Sell signals</div>
    <div class="stat-value sell" id="stat-sell">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Showing</div>
    <div class="stat-value" id="stat-showing">—</div>
  </div>
</div>

<div class="controls">
  <!-- Signal type -->
  <div class="filter-group" id="signal-filter">
    <button class="filter-btn active buy-active" data-val="buy">抄底 Buy</button>
    <button class="filter-btn" data-val="sell">卖出 Sell</button>
    <button class="filter-btn" data-val="all">All</button>
  </div>

  <!-- Timeframe -->
  <div class="filter-group" id="tf-filter">
    <button class="filter-btn active" data-val="all">All TF</button>
    <button class="filter-btn" data-val="daily">Daily</button>
    <button class="filter-btn" data-val="weekly">Weekly</button>
    <button class="filter-btn" data-val="monthly">Monthly</button>
  </div>

  <!-- Market -->
  <div class="filter-group" id="market-filter">
    <button class="filter-btn active" data-val="all">All Markets</button>
    <button class="filter-btn" data-val="US">🇺🇸 US</button>
    <button class="filter-btn" data-val="CN">🇨🇳 China</button>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="text" placeholder="Search ticker…">
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  Fetching latest signals…
</div>

<div class="table-wrap" style="display:none" id="table-wrap">
  <table id="signals-table">
    <thead>
      <tr>
        <th data-col="ticker">Ticker</th>
        <th data-col="signal">Signal</th>
        <th data-col="market">Market</th>
        <th data-col="timeframe">Timeframe</th>
        <th data-col="close">Price</th>
        <th data-col="DIFF">DIFF</th>
        <th data-col="DEA">DEA</th>
        <th data-col="MACD">MACD</th>
        <th data-col="date">Date</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty-state" id="empty" style="display:none">
    <div class="big">📭</div>
    No signals match the current filters.
  </div>
</div>

<script>
const DATA_URL = "signals.json";

let allRows = [];
let sortCol = "date";
let sortDir = "desc";
let filters = { signal: "buy", tf: "all", market: "all", search: "" };

async function loadData() {
  try {
    const res = await fetch(DATA_URL + "?t=" + Date.now());
    const data = await res.json();

    document.getElementById("last-update").textContent =
      "Updated: " + new Date(data.generated_at).toLocaleString();
    document.getElementById("stat-scanned").textContent =
      (data.stats?.total_scanned ?? "—").toLocaleString();
    document.getElementById("stat-buy").textContent =
      (data.stats?.buy_signals ?? 0).toLocaleString();
    document.getElementById("stat-sell").textContent =
      (data.stats?.sell_signals ?? 0).toLocaleString();

    // Merge buy + sell with a type tag
    allRows = [
      ...(data.buy_signals  || []).map(r => ({ ...r, _type: "buy"  })),
      ...(data.sell_signals || []).map(r => ({ ...r, _type: "sell" })),
    ];

    document.getElementById("loading").style.display = "none";
    document.getElementById("table-wrap").style.display = "block";
    render();
  } catch(e) {
    document.getElementById("loading").innerHTML =
      "⚠️ Could not load signals.json — run the scanner first.";
  }
}

function applyFilters(rows) {
  return rows.filter(r => {
    if (filters.signal === "buy"  && r._type !== "buy")  return false;
    if (filters.signal === "sell" && r._type !== "sell") return false;
    if (filters.tf !== "all" && r.timeframe !== filters.tf) return false;
    if (filters.market !== "all" && r.market !== filters.market) return false;
    if (filters.search && !r.ticker.toLowerCase().includes(filters.search)) return false;
    return true;
  });
}

function sortRows(rows) {
  return [...rows].sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (va == null) va = "";
    if (vb == null) vb = "";
    if (typeof va === "number" && typeof vb === "number") {
      return sortDir === "asc" ? va - vb : vb - va;
    }
    return sortDir === "asc"
      ? String(va).localeCompare(String(vb))
      : String(vb).localeCompare(String(va));
  });
}

function fmt(v, digits = 4) {
  if (v == null || isNaN(v)) return "—";
  return Number(v).toFixed(digits);
}

function render() {
  const filtered = applyFilters(allRows);
  const sorted   = sortRows(filtered);

  document.getElementById("stat-showing").textContent = sorted.length.toLocaleString();

  const tbody = document.getElementById("tbody");
  const empty = document.getElementById("empty");

  if (sorted.length === 0) {
    tbody.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  const tfOrder = { daily: 1, weekly: 2, monthly: 3 };

  tbody.innerHTML = sorted.map(r => {
    const signalBadge = r._type === "buy"
      ? `<span class="badge badge-buy cn-signal">抄底</span>`
      : `<span class="badge badge-sell cn-signal">卖出</span>`;
    const macdClass = r.MACD >= 0 ? "macd-pos" : "macd-neg";
    return `
      <tr>
        <td class="ticker-cell">${r.ticker}</td>
        <td>${signalBadge}</td>
        <td><span class="badge badge-market">${r.market}</span></td>
        <td><span class="badge badge-tf">${r.timeframe}</span></td>
        <td class="price-cell">${fmt(r.close, 2)}</td>
        <td class="${r.DIFF >= 0 ? 'macd-pos' : 'macd-neg'}">${fmt(r.DIFF)}</td>
        <td class="${r.DEA  >= 0 ? 'macd-pos' : 'macd-neg'}">${fmt(r.DEA)}</td>
        <td class="${macdClass}">${fmt(r.MACD)}</td>
        <td class="date-cell">${r.date}</td>
      </tr>`;
  }).join("");
}

// ── Controls ─────────────────────────────────────────────────────────────────
function setupFilter(groupId, filterKey) {
  document.getElementById(groupId).addEventListener("click", e => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    document.querySelectorAll(`#${groupId} .filter-btn`).forEach(b => {
      b.classList.remove("active", "buy-active", "sell-active");
    });
    btn.classList.add("active");
    if (btn.dataset.val === "buy")  btn.classList.add("buy-active");
    if (btn.dataset.val === "sell") btn.classList.add("sell-active");
    filters[filterKey] = btn.dataset.val;
    render();
  });
}
setupFilter("signal-filter", "signal");
setupFilter("tf-filter",     "tf");
setupFilter("market-filter", "market");

document.getElementById("search").addEventListener("input", e => {
  filters.search = e.target.value.trim().toLowerCase();
  render();
});

// ── Sortable columns ──────────────────────────────────────────────────────────
document.querySelectorAll("thead th[data-col]").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (sortCol === col) {
      sortDir = sortDir === "asc" ? "desc" : "asc";
    } else {
      sortCol = col;
      sortDir = "desc";
    }
    document.querySelectorAll("thead th").forEach(t => {
      t.classList.remove("sort-asc", "sort-desc");
    });
    th.classList.add(sortDir === "asc" ? "sort-asc" : "sort-desc");
    render();
  });
});

loadData();
</script>
</body>
</html>
