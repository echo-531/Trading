<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRMC 抄底 Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0c0f;
    --surface:   #111318;
    --border:    #1e2229;
    --border2:   #2a3040;
    --text:      #c8d0dd;
    --muted:     #4a5568;
    --buy:       #00e5a0;
    --accent:    #3b82f6;
    --warn:      #f59e0b;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #fff;
  }
  .logo span { color: var(--buy); }
  #last-update {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  /* ── Stats bar ── */
  .stats {
    display: flex;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    flex: 1;
    padding: 14px 24px;
    background: var(--surface);
  }
  .stat-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: #fff;
  }
  .stat-value.buy { color: var(--buy); }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .filter-group {
    display: flex;
    gap: 2px;
    background: var(--border);
    padding: 2px;
    border-radius: 6px;
  }
  .filter-btn {
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 14px;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .filter-btn:hover  { color: var(--text); }
  .filter-btn.active {
    background: var(--border2);
    color: var(--buy);
    font-weight: 500;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 180px;
    max-width: 300px;
  }
  .search-wrap svg {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }
  #search {
    width: 100%;
    padding: 7px 10px 7px 34px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  /* ── Table ── */
  .table-wrap {
    overflow-x: auto;
    padding: 0 32px 32px;
    margin-top: 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12px;
  }
  thead th {
    text-align: left;
    padding: 8px 12px;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border2);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--text); }
  thead th.sort-asc::after  { content: " ↑"; color: var(--accent); }
  thead th.sort-desc::after { content: " ↓"; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--surface); }

  td {
    padding: 10px 12px;
    vertical-align: middle;
    white-space: nowrap;
  }

  .ticker-cell {
    font-weight: 600;
    font-size: 13px;
    color: #fff;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .badge-buy    { background: rgba(0,229,160,0.12); color: var(--buy);    border: 1px solid rgba(0,229,160,0.3); }
  .badge-tf     { background: rgba(59,130,246,0.1);  color: var(--accent); border: 1px solid rgba(59,130,246,0.2); }
  .badge-market { background: rgba(245,158,11,0.1);  color: var(--warn);   border: 1px solid rgba(245,158,11,0.2); }
  .badge-sector { background: rgba(167,139,250,0.12); color: #a78bfa;       border: 1px solid rgba(167,139,250,0.28); text-transform: none; letter-spacing: 0; }
  .industry-cell { color: var(--text); }

  /* ── Filter dropdowns (Sector / Industry) ── */
  .filter-select {
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 10px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    outline: none;
    cursor: pointer;
    max-width: 200px;
    transition: border-color 0.15s;
  }
  .filter-select:hover  { color: #fff; }
  .filter-select:focus  { border-color: var(--accent); }

  .price-cell { color: #fff; }
  .macd-pos   { color: var(--buy); }
  .macd-neg   { color: #ff4d6a; }
  .date-cell  { color: var(--muted); }

  .empty-state {
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
  }
  .empty-state .big { font-size: 32px; margin-bottom: 12px; }

  #loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px;
    gap: 12px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .cn-signal {
    font-family: 'Noto Sans SC', var(--sans);
    font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">MRMC <span>抄底</span> Scanner</div>
  <div id="last-update">Loading…</div>
</header>

<div class="stats">
  <div class="stat">
    <div class="stat-label">Scanned</div>
    <div class="stat-value" id="stat-scanned">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">抄底 Buy Signals</div>
    <div class="stat-value buy" id="stat-buy">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Showing</div>
    <div class="stat-value buy" id="stat-showing">—</div>
  </div>
</div>

<div class="controls">
  <!-- Timeframe -->
  <div class="filter-group" id="tf-filter">
    <button class="filter-btn active" data-val="all">All Timeframes</button>
    <button class="filter-btn" data-val="daily">Daily</button>
    <button class="filter-btn" data-val="weekly">Weekly</button>
    <button class="filter-btn" data-val="monthly">Monthly</button>
  </div>

  <!-- Market filter removed — US-only scanner -->

  <!-- Sector (板块) -->
  <select id="sector-filter" class="filter-select">
    <option value="all">All Sectors / 全部板块</option>
  </select>

  <!-- Industry (行业) -->
  <select id="industry-filter" class="filter-select">
    <option value="all">All Industries / 全部行业</option>
  </select>

  <!-- Search -->
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="text" placeholder="Search ticker…">
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  Fetching latest signals…
</div>

<div class="table-wrap" style="display:none" id="table-wrap">
  <table id="signals-table">
    <thead>
      <tr>
        <th data-col="ticker">Ticker</th>
        <th data-col="signal">Signal</th>
        <th data-col="market">Market</th>
        <th data-col="sector">板块 Sector</th>
        <th data-col="industry">行业 Industry</th>
        <th data-col="timeframe">Timeframe</th>
        <th data-col="close">Price</th>
        <th data-col="DIFF">DIFF</th>
        <th data-col="DEA">DEA</th>
        <th data-col="MACD">MACD</th>
        <th data-col="signal_date">信号日期</th>
        <th data-col="bars_ago">距今(bars)</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty-state" id="empty" style="display:none">
    <div class="big">📭</div>
    No 抄底 signals match the current filters.
  </div>
</div>

<script>
const DATA_URL = "signals.json";

let allRows = [];
let sortCol = "signal_date";
let sortDir = "desc";
let filters = { tf: "all", market: "all", sector: "all", industry: "all", search: "" };

async function loadData() {
  try {
    const res  = await fetch(DATA_URL + "?t=" + Date.now());
    const data = await res.json();

    document.getElementById("last-update").textContent =
      "Updated: " + new Date(data.generated_at).toLocaleString();
    document.getElementById("stat-scanned").textContent =
      (data.stats?.total_scanned ?? "—").toLocaleString();
    document.getElementById("stat-buy").textContent =
      (data.stats?.buy_signals ?? 0).toLocaleString();

    // Buy signals only
    allRows = (data.buy_signals || []).map(r => ({ ...r, _type: "buy" }));

    populateFilterOptions();

    document.getElementById("loading").style.display    = "none";
    document.getElementById("table-wrap").style.display = "block";
    render();
  } catch(e) {
    document.getElementById("loading").innerHTML =
      "⚠️ Could not load signals.json — run the scanner first.";
  }
}

function applyFilters(rows) {
  return rows.filter(r => {
    if (filters.tf       !== "all" && r.timeframe !== filters.tf)       return false;
    if (filters.market   !== "all" && r.market    !== filters.market)   return false;
    if (filters.sector   !== "all" && (r.sector   || "Unknown") !== filters.sector)   return false;
    if (filters.industry !== "all" && (r.industry || "Unknown") !== filters.industry) return false;
    if (filters.search && !r.ticker.toLowerCase().includes(filters.search)) return false;
    return true;
  });
}

function sortRows(rows) {
  return [...rows].sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (va == null) va = "";
    if (vb == null) vb = "";
    if (typeof va === "number" && typeof vb === "number") {
      return sortDir === "asc" ? va - vb : vb - va;
    }
    return sortDir === "asc"
      ? String(va).localeCompare(String(vb))
      : String(vb).localeCompare(String(va));
  });
}

function fmt(v, digits = 4) {
  if (v == null || isNaN(v)) return "—";
  return Number(v).toFixed(digits);
}

// Build the Sector / Industry dropdown options from whatever is in the data.
// "Unknown" (if present) is always pushed to the end; everything else sorted.
function populateFilterOptions() {
  const uniq = key => {
    const set = new Set(allRows.map(r => r[key] || "Unknown"));
    const hasUnknown = set.delete("Unknown");
    const list = [...set].sort((a, b) => a.localeCompare(b));
    if (hasUnknown) list.push("Unknown");
    return list;
  };

  const fill = (selId, values, allLabel, current) => {
    const sel = document.getElementById(selId);
    sel.innerHTML =
      `<option value="all">${allLabel}</option>` +
      values.map(v => `<option value="${v}">${v}</option>`).join("");
    // keep the user's current choice if it still exists
    sel.value = values.includes(current) ? current : "all";
  };

  fill("sector-filter",   uniq("sector"),   "All Sectors / 全部板块",   filters.sector);
  fill("industry-filter", uniq("industry"), "All Industries / 全部行业", filters.industry);
}

function render() {
  const filtered = applyFilters(allRows);
  const sorted   = sortRows(filtered);

  document.getElementById("stat-showing").textContent = sorted.length.toLocaleString();

  const tbody = document.getElementById("tbody");
  const empty = document.getElementById("empty");

  if (sorted.length === 0) {
    tbody.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  tbody.innerHTML = sorted.map(r => {
    const macdClass = r.MACD >= 0 ? "macd-pos" : "macd-neg";
    return `
      <tr>
        <td class="ticker-cell">${r.ticker}</td>
        <td><span class="badge badge-buy cn-signal">抄底</span></td>
        <td><span class="badge badge-market">${r.market}</span></td>
        <td><span class="badge badge-sector">${r.sector || 'Unknown'}</span></td>
        <td class="industry-cell">${r.industry || 'Unknown'}</td>
        <td><span class="badge badge-tf">${r.timeframe}</span></td>
        <td class="price-cell">${fmt(r.close, 2)}</td>
        <td class="${r.DIFF >= 0 ? 'macd-pos' : 'macd-neg'}">${fmt(r.DIFF)}</td>
        <td class="${r.DEA  >= 0 ? 'macd-pos' : 'macd-neg'}">${fmt(r.DEA)}</td>
        <td class="${macdClass}">${fmt(r.MACD)}</td>
        <td class="date-cell">${r.signal_date}</td>
        <td class="date-cell">${r.bars_ago === 0 ? '<span style="color:var(--buy)">今天</span>' : r.bars_ago + ' bars前'}</td>
      </tr>`;
  }).join("");
}

// ── Controls ──────────────────────────────────────────────────────────────────
function setupFilter(groupId, filterKey) {
  document.getElementById(groupId).addEventListener("click", e => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    document.querySelectorAll(`#${groupId} .filter-btn`).forEach(b => {
      b.classList.remove("active");
    });
    btn.classList.add("active");
    filters[filterKey] = btn.dataset.val;
    render();
  });
}
setupFilter("tf-filter",     "tf");
// market-filter removed (US-only); filters.market stays "all" so no rows are excluded.

document.getElementById("search").addEventListener("input", e => {
  filters.search = e.target.value.trim().toLowerCase();
  render();
});

document.getElementById("sector-filter").addEventListener("change", e => {
  filters.sector = e.target.value;
  render();
});
document.getElementById("industry-filter").addEventListener("change", e => {
  filters.industry = e.target.value;
  render();
});

// ── Sortable columns ──────────────────────────────────────────────────────────
document.querySelectorAll("thead th[data-col]").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (sortCol === col) {
      sortDir = sortDir === "asc" ? "desc" : "asc";
    } else {
      sortCol = col;
      sortDir = "desc";
    }
    document.querySelectorAll("thead th").forEach(t => {
      t.classList.remove("sort-asc", "sort-desc");
    });
    th.classList.add(sortDir === "asc" ? "sort-asc" : "sort-desc");
    render();
  });
});

loadData();
</script>
</body>
</html>
