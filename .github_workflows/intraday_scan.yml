name: MRMC Intraday Scanner

on:
  schedule:
    # Every hour during US market hours (Mon–Fri), UTC times:
    # 13:30 = 09:30 ET (open)
    # 14:00–19:00 = 10:00–15:00 ET (every hour)
    # 19:30 = 15:30 ET (30 min before close)
    - cron: "30 13 * * 1-5"
    - cron: "0 14 * * 1-5"
    - cron: "0 15 * * 1-5"
    - cron: "0 16 * * 1-5"
    - cron: "0 17 * * 1-5"
    - cron: "0 18 * * 1-5"
    - cron: "0 19 * * 1-5"
    - cron: "30 19 * * 1-5"
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  intraday-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy

      - name: Run intraday scanner
        run: |
          python intraday_scanner.py --force

      - name: Commit and push intraday_signals.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/intraday_signals.json
          git diff --staged --quiet || git commit -m "chore: intraday signals $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
